name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Download bundled Russian large Vosk model
        shell: pwsh
        run: |
          $modelsRoot = "src-tauri/resources/models/vosk"
          $modelDir = Join-Path $modelsRoot "vosk-model-ru-0.42"
          if (-not (Test-Path $modelDir)) {
            $zipPath = Join-Path $env:RUNNER_TEMP "vosk-model-ru-0.42.zip"
            Invoke-WebRequest -Uri "https://alphacephei.com/vosk/models/vosk-model-ru-0.42.zip" -OutFile $zipPath
            tar -xf $zipPath -C $modelsRoot
          }
          Set-Content -Path (Join-Path $modelsRoot "active_model.txt") -Value "vosk-model-ru-0.42"

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
        with:
          tagName: v__VERSION__
          releaseName: AI Interview v__VERSION__
          releaseBody: Automatically published AI Interview release.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: false
